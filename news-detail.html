<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Detail | University of Turbat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              darkTeal: '#0F4C5C',
              teal: '#16697A',
              gold: '#D4AF37',
              sand: '#FDFBF7',
            },
          },
          fontFamily: {
            serif: ['Playfair Display', 'serif'],
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
</head>
<body class="bg-brand-sand text-gray-900 antialiased selection:bg-brand-gold selection:text-white font-sans">
  <nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 py-4">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="bg-white/90 backdrop-blur-xl border border-white/20 rounded-2xl sm:rounded-full px-4 sm:px-6 py-3 flex items-center justify-between shadow-lg shadow-black/5">
        <div class="flex items-center gap-3 cursor-pointer group" onclick="window.location.href='index.html'">
          <img src="https://uot.edu.pk/img/uotlogo.png" alt="UoT Logo" class="h-10 w-10 object-contain bg-white rounded-full p-0.5" />
          <div class="hidden md:flex flex-col leading-none">
            <span class="text-base sm:text-lg font-bold text-brand-darkTeal tracking-tight">University of Turbat</span>
          </div>
        </div>
        <div class="hidden xl:flex items-center gap-6 text-sm font-medium text-brand-darkTeal">
          <a href="index.html" class="hover:text-brand-gold transition-colors font-semibold">Home</a>
          <a href="all-news.html" class="hover:text-brand-gold transition-colors font-semibold text-brand-gold">News & Events</a>
          <button class="bg-brand-darkTeal text-white px-5 py-2 rounded-full hover:bg-brand-teal transition-all">Apply Now</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="pt-36 pb-24">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
      <a href="all-news.html" class="inline-flex items-center gap-2 text-brand-darkTeal font-bold mb-6 group">
        <i data-lucide="arrow-left" class="w-4 h-4 transition-transform group-hover:-translate-x-0.5"></i>
        Back to News
      </a>

      <div id="article" class="bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm">
        <div id="hero" class="relative h-56 sm:h-72 md:h-96 bg-gray-100">
          <img id="hero-img" alt="" class="w-full h-full object-cover hidden" />
          <div id="category-pill" class="absolute top-4 right-4 hidden bg-brand-gold text-brand-darkTeal px-3 py-1 rounded-full text-[10px] sm:text-xs font-bold uppercase tracking-widest"></div>
        </div>
        <div class="p-6 sm:p-10">
          <div class="flex items-center gap-3 text-brand-gold text-xs sm:text-sm font-semibold mb-3">
            <i data-lucide="calendar" class="w-4 h-4"></i>
            <time id="date"></time>
          </div>
          <h1 id="title" class="text-2xl sm:text-3xl md:text-4xl font-serif font-bold text-brand-darkTeal mb-4"></h1>
          <div id="content" class="prose prose-sm sm:prose lg:prose-lg max-w-none text-gray-700"></div>
        </div>
      </div>

      <div id="not-found" class="hidden text-center text-gray-600 mt-20">
        <p class="text-lg font-semibold mb-2">News item not found</p>
        <p class="mb-6">The requested news could not be located. It may have been moved or removed.</p>
        <a href="all-news.html" class="text-brand-darkTeal font-bold">View all news</a>
      </div>
    </div>
  </main>

  <footer class="bg-brand-darkTeal text-white pt-16 pb-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="border-t border-white/10 pt-6 md:pt-8 flex flex-col md:flex-row justify-between items-center text-xs md:text-sm text-white/50">
        <p>&copy; 2026 University of Turbat. All rights reserved.</p>
        <div class="flex gap-5 mt-3 md:mt-0">
          <a href="#" class="hover:text-white transition-colors">Privacy Policy</a>
          <a href="#" class="hover:text-white transition-colors">Terms of Use</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    // Icons
    if (window.lucide && typeof lucide.createIcons === 'function') {
      lucide.createIcons();
    }

    function qs(name) {
      const p = new URLSearchParams(window.location.search);
      return p.get(name);
    }

    async function loadNewsItem() {
      const id = qs('id');
      const article = document.getElementById('article');
      const notFound = document.getElementById('not-found');

      try {
        const res = await fetch('news.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to fetch news.json');
        const data = await res.json();
        const item = data.find(n => n.id === id);
        if (!item) {
          article.classList.add('hidden');
          notFound.classList.remove('hidden');
          return;
        }

        // Populate UI
        document.title = item.title + ' | News | University of Turbat';
        document.getElementById('title').textContent = item.title;
        document.getElementById('date').textContent = item.date;

        const pill = document.getElementById('category-pill');
        if (item.category) {
          pill.textContent = item.category;
          pill.classList.remove('hidden');
        }

        const heroImg = document.getElementById('hero-img');
        if (item.image) {
          heroImg.src = item.image;
          heroImg.alt = item.title;
          heroImg.classList.remove('hidden');
        }

        const content = document.getElementById('content');
        // Trusting basic HTML paragraphs in content; avoid scripts
        content.innerHTML = Array.isArray(item.content)
          ? item.content.map(p => `<p>${p}</p>`).join('')
          : `<p>${item.content}</p>`;
      } catch (e) {
        console.error(e);
        article.classList.add('hidden');
        notFound.classList.remove('hidden');
      }
    }

    loadNewsItem();
  </script>
</body>
</html>
